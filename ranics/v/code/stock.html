<!DOCTYPE html>
<html>

<head>
    <title>stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
        Link to the css file. -->
    <link rel="stylesheet" href="ranics.css" />
</head>

<body>
    <div id="stock">
        <form class="frame" action="" method="post">
            <h3>Vehicle Stock</h3>
            <!-- 
                Vehicle registration number.
            -->
            <label>Car Registration Number:
                <input 
                    data-ename="stock"
                    id="reg_no"
                    name="reg_no"
                    type="text" 
                    style="text-transform:uppercase"   
                    maxlength="8"
                    minlength="7"
                    pattern="\w{3}\d{3}\w" 
                    title="Use this format instead KBZ999Z" 
                    placeholder="Number Plate"
                    required 
                />
            </label>
            <fieldset>
                <!--
                     The type of vehicle. 
                -->
                <legend>Vehicle Category:</legend>
                <label><input type="radio" id="category" name="category" value="Car" required />Car</label>
                <label><input type="radio" id="category" name="category" value="Lorry" required />Lorry</label>
                <label><input type="radio" id="category" name="category" value="Motorcycle" required />Motorcycle</label>
            </fieldset>

            <fieldset>
                <!-- 
                    The time of the day.
                -->
                <legend>Time of the Day:</legend>
                <label><input type="radio" id="daytime" name="daytime" value="Morning" required />Morning</label>
                <label><input type="radio" id="daytime" name="daytime" value="Mid-day" required />Mid-day</label>
                <label><input type="radio" id="daytime" name="daytime" value="Evening" required />Evening</label>
            </fieldset>
            <fieldset>
                <label><input id="datetime" name="datetime" hidden/></label>
                <label><input type='text' name="name" id="name" hidden /></label>
                <!-- 
                     The error message reporting element
                -->
                <div id="reports" class="error">
                </div>
            </fieldset>
        </form>
    </div>
    <button id="go">Go</button>
    <button id="cancel">Cancel</button>
</body>

</html>

<!doctype html>
<html>

<head>
    <title>vehicle_flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        Link to the css file. -->
    <link rel="stylesheet" href="ranics.css" />
</head>

<body>
    <form class="frame" action="" method="post">
        <h3>Vehicle Flow</h3>
        <!-- 
            Vehicle registration number.
         -->
        <p> Registration Number</p>
        <input 
            type="text" 
            style="text-transform:uppercase" 
            id="reg_no" 
            name="reg_no" 
            placeholder="Number Plate" 
            pattern="\w{3}\d{3}\w"
            maxlength="8" 
            minlength="7"
            required
            />
        <!-- 
            Vehicle category.
         -->
        <fieldset>
            <legend>Vehicle Category:</legend>
            <label><input type="radio" id="category" name="category" value="Car" required />Car</label>
            <label><input type="radio" id="category" name="category" value="Lorry" required/>Lorry</label>
            <label><input type="radio" id="category" name="category" value="Motorcycle" required/>Motorcycle</label>
        </fieldset>
        <!--
            Vehicle flow direction.
         -->
        <fieldset>
            <legend>Direction of the vehicle:</legend>
            <label><input type="radio" id="direction" name="direction" value="Incoming" required/>Incoming </label>
            <label><input type="radio" id="direction" name="direction" value="Outgoing" required/>Outgoing</label>
        </fieldset>
        <fieldset>
            <label><input id="datetime" name="datetime" hidden/></label>
            <label><input type='text' name="name" id="name" hidden /></label>
            <div id="reports" class="error">
            </div>
        </fieldset>
    </form>
    <div id="reports" class="error">
    </div>
    <button id="go">Ok </button>
    <button id="cancel">Cancel</button>
</body>

</html>
